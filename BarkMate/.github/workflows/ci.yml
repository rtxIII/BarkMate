name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install tools
        run: brew install xcodegen swiftlint xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Test Models package
        working-directory: Packages/Models
        run: swift test --enable-code-coverage

      - name: Test Store package
        working-directory: Packages/Store
        run: swift test --enable-code-coverage

      - name: Resolve SPM packages
        run: xcodebuild -scheme BarkMate -destination 'generic/platform=iOS Simulator' -resolvePackageDependencies

      - name: Build iOS app
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme BarkMate \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging
