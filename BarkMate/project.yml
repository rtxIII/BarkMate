name: BarkMate
options:
  bundleIdPrefix: com.barkagent
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

configs:
  Debug: debug
  Release: release

settings:
  base:
    DEVELOPMENT_TEAM: "STLD27C5KT"
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: NO
    CURRENT_PROJECT_VERSION: "5"
    MARKETING_VERSION: "1.0.0"
    CODE_SIGN_STYLE: Automatic
  configs:
    Debug:
      APS_ENVIRONMENT: development
    Release:
      APS_ENVIRONMENT: production

packages:
  Models:
    path: Packages/Models
  BarkService:
    path: Packages/BarkService
  Store:
    path: Packages/Store
  DesignSystem:
    path: Packages/DesignSystem
  Factory:
    url: https://github.com/hmlongco/Factory
    from: "2.5.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"

targets:

  # =====================================================
  # Main App
  # =====================================================
  BarkMate:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
      - path: App/Resources
    info:
      path: App/Info.plist
      properties:
        AppIdentifierPrefix: $(AppIdentifierPrefix)
        CFBundleDisplayName: BarkAgent
        CFBundleIconName: AppIcon
        LSApplicationCategoryType: public.app-category.developer-tools
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleLocalizations:
          - en
          - zh-Hans
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        UIRequiresFullScreen: true
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: App/BarkMate.entitlements
      properties:
        aps-environment: $(APS_ENVIRONMENT)
        com.apple.security.application-groups:
          - group.com.barkagent.shared
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.barkagent.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.barkagent.ios
        PRODUCT_NAME: BarkAgent
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: NO
    dependencies:
      - target: NotificationServiceExtension
      - target: BarkMateWidgets
      - package: Models
      - package: BarkService
      - package: Store
      - package: DesignSystem
      - package: Factory
      - package: MarkdownUI

  # =====================================================
  # Notification Service Extension
  # =====================================================
  NotificationServiceExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: NotificationServiceExtension/Sources
    info:
      path: NotificationServiceExtension/Info.plist
      properties:
        AppIdentifierPrefix: $(AppIdentifierPrefix)
        CFBundleDisplayName: BarkAgent Notifications
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    entitlements:
      path: NotificationServiceExtension/NotificationService.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.barkagent.shared
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.barkagent.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.barkagent.ios.NotificationServiceExtension
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: Models
      - package: BarkService
      - package: Store
      - package: Factory

  # =====================================================
  # Widgets Extension
  # =====================================================
  BarkMateWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets/Sources
    info:
      path: Widgets/Info.plist
      properties:
        AppIdentifierPrefix: $(AppIdentifierPrefix)
        CFBundleDisplayName: BarkAgent Widgets
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widgets/BarkMateWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.barkagent.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.barkagent.ios.Widgets
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: Models
      - package: Store
      - package: DesignSystem

  # =====================================================
  # App Tests
  # =====================================================
  BarkMateTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: App/Tests/BarkMateTests
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.barkagent.ios.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BarkAgent.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/BarkAgent"
    dependencies:
      - target: BarkMate
      - package: Models
      - package: BarkService
      - package: Store

  # =====================================================
  # App UI Tests
  # =====================================================
  BarkMateUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: App/UITests/BarkMateUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.barkagent.ios.uitests
        TEST_TARGET_NAME: BarkMate
    dependencies:
      - target: BarkMate

schemes:
  BarkMate:
    build:
      targets:
        BarkMate: all
        BarkMateTests: [test]
        BarkMateUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BarkMateTests
        - BarkMateUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

# Note: SPM package tests (e.g. ModelsTests) run via `swift test` in the
# respective package directory, or by selecting the package's test plan in Xcode.
