name: BarkMate
options:
  bundleIdPrefix: com.barkmate
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

configs:
  Debug: debug
  Release: release

settings:
  base:
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: NO
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    CODE_SIGN_STYLE: Automatic

packages:
  Models:
    path: Packages/Models
  BarkService:
    path: Packages/BarkService
  Store:
    path: Packages/Store
  MemoKit:
    path: Packages/MemoKit
  DesignSystem:
    path: Packages/DesignSystem
  Factory:
    url: https://github.com/hmlongco/Factory
    from: "2.5.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"

targets:

  # =====================================================
  # Main App
  # =====================================================
  BarkMate:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
    resources:
      - path: App/Resources
        optional: true
    info:
      path: App/Info.plist
      properties:
        AppIdentifierPrefix: $(AppIdentifierPrefix)
        CFBundleDisplayName: BarkMate
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSUserNotificationsUsageDescription: "BarkMate needs to show notifications when new messages arrive."
        NSPhotoLibraryUsageDescription: "BarkMate needs photo access to attach images to memos."
    entitlements:
      path: App/BarkMate.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.com.barkmate.shared
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.barkmate.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.barkmate.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: NO
    dependencies:
      - target: NotificationServiceExtension
      - target: ShareExtension
      - target: BarkMateWidgets
      - package: Models
      - package: BarkService
      - package: Store
      - package: MemoKit
      - package: DesignSystem
      - package: Factory
      - package: MarkdownUI

  # =====================================================
  # Notification Service Extension
  # =====================================================
  NotificationServiceExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: NotificationServiceExtension/Sources
    info:
      path: NotificationServiceExtension/Info.plist
      properties:
        AppIdentifierPrefix: $(AppIdentifierPrefix)
        CFBundleDisplayName: BarkMate Notifications
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    entitlements:
      path: NotificationServiceExtension/NotificationService.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.barkmate.shared
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.barkmate.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.barkmate.ios.NotificationServiceExtension
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: Models
      - package: BarkService
      - package: Store
      - package: Factory

  # =====================================================
  # Share Extension
  # =====================================================
  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension/Sources
    info:
      path: ShareExtension/Info.plist
      properties:
        AppIdentifierPrefix: $(AppIdentifierPrefix)
        CFBundleDisplayName: Save to BarkMate
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 5
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.barkmate.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.barkmate.ios.ShareExtension
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: Models
      - package: Store
      - package: BarkService
      - package: Factory

  # =====================================================
  # Widgets Extension
  # =====================================================
  BarkMateWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets/Sources
    info:
      path: Widgets/Info.plist
      properties:
        AppIdentifierPrefix: $(AppIdentifierPrefix)
        CFBundleDisplayName: BarkMate Widgets
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widgets/BarkMateWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.barkmate.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.barkmate.ios.Widgets
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: Models
      - package: Store
      - package: DesignSystem

schemes:
  BarkMate:
    build:
      targets:
        BarkMate: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

# Note: SPM package tests (e.g. ModelsTests) run via `swift test` in the
# respective package directory, or by selecting the package's test plan in Xcode.
